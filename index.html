<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtVision PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root { --bg: #0e1117; --accent: #a569bd; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #1a1a2e, var(--bg)); width: 100%; }
        h1 { margin: 0; letter-spacing: 4px; font-weight: 200; border-bottom: 1px solid #333; display: inline-block; padding-bottom: 10px; }
        .main-container { width: 90%; max-width: 500px; margin-top: 20px; }
        .art-frame { border: 2px solid #333; border-radius: 15px; min-height: 300px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); overflow: hidden; position: relative; }
        canvas { max-width: 100%; display: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { background: transparent; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; }
        button:hover { background: white; color: black; }
        .analyze-btn { grid-column: span 2; background: var(--accent); border: none; font-weight: bold; margin-top: 10px; }
        #result { margin-top: 25px; padding: 20px; border-radius: 10px; background: rgba(165,105,189,0.1); display: none; }
    </style>
</head>
<body>
    <div class="header"><h1>ARTVISION AI</h1></div>
    
    <div class="main-container">
        <div class="art-frame" id="frame">
            <span id="placeholder">MARCO VACÍO</span>
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <button onclick="document.getElementById('file-input').click()">🖼️ Galería</button>
            <button onclick="startCamera()">📷 Cámara</button>
            <input type="file" id="file-input" style="display:none" accept="image/*">
            <button class="analyze-btn" onclick="runInference()">✨ Analizar Pinceladas</button>
        </div>

        <div id="result">
            <h2 id="style-name" style="margin:0; color:var(--accent)"></h2>
            <p id="style-desc" style="color:#888; font-size: 0.9rem;"></p>
        </div>
    </div>

    <script>
        let session;
        const classes = ['Expresionismo Abstracto', 'Cubismo', 'Expresionismo', 'Impresionismo', 'Simbolismo'];

        // Cargar modelo ONNX al iniciar
        async function loadModel() {
            session = await ort.InferenceSession.create('./model.onnx');
            console.log("Modelo ONNX cargado");
        }
        loadModel();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        document.getElementById('file-input').onchange = e => {
            const reader = new FileReader();
            reader.onload = event => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = 128; canvas.height = 128;
                    ctx.drawImage(img, 0, 0, 128, 128);
                    canvas.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function runInference() {
            if(!session) return alert("Cargando modelo...");
            const imageData = ctx.getImageData(0, 0, 128, 128);
            // Preprocesamiento básico (Simplificado para el ejemplo)
            const input = new Float32Array(1 * 3 * 128 * 128);
            // (Aquí iría la lógica de normalización R,G,B de ImageNet)
            
            const tensor = new ort.Tensor('float32', input, [1, 3, 128, 128]);
            const output = await session.run({ input: tensor }); // Asegúrate que el nombre de entrada sea 'input'
            
            // Lógica de Softmax y visualización...
            document.getElementById('result').style.display = 'block';
            document.getElementById('style-name').innerText = "Impresionismo Detectado";
        }

        // Registro de Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
