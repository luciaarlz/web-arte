<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtVision AI | Curador Experto</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root {
            --bg: #0e1117;
            --accent: #a569bd;
            --text: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a2e, var(--bg));
            width: 100%;
        }

        h1 {
            margin: 0;
            letter-spacing: 5px;
            font-weight: 200;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #777);
            /* Corrección de compatibilidad sugerida por VS Code */
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        .art-frame {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: none;
            border-radius: 10px;
        }

        #placeholder-text {
            color: #555;
            text-align: center;
            font-style: italic;
            padding: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 600;
        }

        button:hover:not(:disabled) {
            background: white;
            color: black;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .analyze-btn {
            grid-column: span 2;
            background: linear-gradient(45deg, #6a11cb, #2575fc);
            border: none;
            font-size: 13px;
        }

        #status-msg {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--accent);
            text-align: center;
            font-weight: bold;
        }

        #result-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(165, 105, 189, 0.1);
            border: 1px solid rgba(165, 105, 189, 0.2);
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ArtVision AI</h1>
        <p style="color: #666; font-size: 0.8rem; margin-top: 10px;">ANÁLISIS DE ESTILO OFFLINE</p>
    </div>
    
    <div class="main-container">
        <div class="art-frame">
            <div id="placeholder-text">🎨 Selecciona o captura una obra</div>
            <canvas id="canvas"></canvas>
        </div>

        <div id="status-msg">Iniciando sistema...</div>

        <div class="controls">
            <button onclick="document.getElementById('file-input').click()">🖼️ Galería</button>
            <button onclick="startCamera()">📷 Cámara</button>
            <input type="file" id="file-input" style="display:none" accept="image/*">
            <button id="btn-analyze" class="analyze-btn" onclick="runInference()" disabled>Cargando Modelo...</button>
        </div>

        <div id="result-box">
            <p style="margin:0; font-size:0.7rem; color:#aaa; text-transform:uppercase;">Resultado</p>
            <h2 id="style-name" style="margin:5px 0;"></h2>
            <p id="style-desc" style="color:#888; font-size: 0.85rem;"></p>
        </div>
    </div>

    <script>
        let session;
        const classes = ['Expresionismo Abstracto', 'Cubismo', 'Expresionismo', 'Impresionismo', 'Simbolismo'];
        const statusMsg = document.getElementById('status-msg');
        const btnAnalyze = document.getElementById('btn-analyze');

        // Función de Carga con Manejo de Errores
        async function loadModel() {
            try {
                statusMsg.innerText = "Descargando conocimiento artístico (45MB)...";
                // Forzamos el uso de WASM para evitar errores de GPU en móviles
                session = await ort.InferenceSession.create('./model.onnx', { 
                    executionProviders: ['wasm'] 
                });
                statusMsg.innerText = "✅ Sistema Listo";
                btnAnalyze.innerText = "✨ ANALIZAR OBRA";
                btnAnalyze.disabled = false;
            } catch (e) {
                statusMsg.innerText = "❌ Error al cargar. Verifica model.onnx";
                console.error("Error detallado:", e);
            }
        }

        loadModel();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        document.getElementById('file-input').onchange = e => {
            const reader = new FileReader();
            reader.onload = event => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = 128; 
                    canvas.height = 128;
                    ctx.drawImage(img, 0, 0, 128, 128);
                    canvas.style.display = 'block';
                    document.getElementById('placeholder-text').style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function runInference() {
            if(!session) return;
            statusMsg.innerText = "Analizando pinceladas...";
            
            const imgData = ctx.getImageData(0, 0, 128, 128);
            const input = new Float32Array(1 * 3 * 128 * 128);
            
            // Preprocesamiento (Normalización)
            for (let i = 0; i < 128 * 128; i++) {
                input[i] = (imgData.data[i * 4] / 255 - 0.485) / 0.229;           // R
                input[i + 16384] = (imgData.data[i * 4 + 1] / 255 - 0.456) / 0.224; // G
                input[i + 32768] = (imgData.data[i * 4 + 2] / 255 - 0.406) / 0.225; // B
            }

            try {
                const tensor = new ort.Tensor('float32', input, [1, 3, 128, 128]);
                const output = await session.run({ input: tensor });
                const outputData = output.output.data;
                const maxIdx = outputData.indexOf(Math.max(...outputData));

                document.getElementById('result-box').style.display = 'block';
                document.getElementById('style-name').innerText = classes[maxIdx];
                statusMsg.innerText = "Análisis finalizado";
            } catch (e) {
                statusMsg.innerText = "❌ Error en inferencia";
                console.error(e);
            }
        }

        function startCamera() {
            alert("Acceso a cámara en desarrollo. Usa Galería por ahora.");
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
