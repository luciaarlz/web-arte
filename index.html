<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtVision AI | Galería Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root { 
            --bg: #0e1117; 
            --accent: #a569bd; 
            --text: #ffffff; 
            --card-bg: rgba(255, 255, 255, 0.03); 
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        .header { 
            padding: 30px 20px; 
            text-align: center; 
            width: 100%; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        h1 { 
            margin: 0; 
            letter-spacing: 4px; 
            font-weight: 300; 
            text-transform: uppercase; 
            background: linear-gradient(90deg, #fff, var(--accent)); 
            -webkit-background-clip: text; 
            background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .main-container { 
            width: 95%; 
            max-width: 550px; 
            margin-top: 20px; 
            padding-bottom: 40px; 
        }

        /* MARCO DE ARTE MEJORADO */
        .art-frame { 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            background: #000; /* Fondo negro para que la obra destaque */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            min-height: 200px; /* Se expandirá con la imagen */
        }

        canvas { 
            width: 100%; /* Ocupa todo el ancho del contenedor */
            height: auto; /* Mantiene la proporción real */
            display: none;
        }

        #placeholder-text { 
            color: #444; 
            padding: 60px 20px; 
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 20px; 
        }

        button { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            padding: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.2s; 
            text-transform: uppercase; 
            font-size: 10px; 
            font-weight: 600; 
        }

        button:hover:not(:disabled) { background: white; color: black; }
        
        .analyze-btn { 
            grid-column: span 2; 
            background: linear-gradient(45deg, #6a11cb, #2575fc); 
            border: none; 
            font-size: 12px; 
        }

        #status-msg { 
            margin-top: 15px; 
            font-size: 0.75rem; 
            color: var(--accent); 
            text-align: center; 
            font-weight: bold;
        }

        /* PANEL DE RESULTADOS Y DIAGRAMA */
        #result-box { 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 15px; 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.05); 
            display: none; 
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .chart-row { 
            margin-bottom: 12px; 
        }

        .chart-label { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.75rem; 
            margin-bottom: 5px; 
            color: #aaa; 
        }

        .bar-bg { 
            height: 6px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 3px; 
            overflow: hidden; 
        }

        .bar-fill { 
            height: 100%; 
            background: var(--accent); 
            width: 0%; 
            transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
    </style>
</head>
<body>

    <div class="header"><h1>ArtVision AI</h1></div>
    
    <div class="main-container">
        <div class="art-frame" id="frame">
            <div id="placeholder-text">SELECCIONA UNA OBRA MAESTRA</div>
            <canvas id="canvas"></canvas>
        </div>

        <div id="status-msg">Iniciando motor neuronal...</div>

        <div class="controls">
            <button onclick="document.getElementById('file-input').click()">🖼️ Galería</button>
            <button onclick="alert('Cámara en pruebas...')">📷 Cámara</button>
            <input type="file" id="file-input" style="display:none" accept="image/*">
            <button id="btn-analyze" class="analyze-btn" onclick="runInference()" disabled>Cargando Inteligencia...</button>
        </div>

        <div id="result-box">
            <p style="text-align:center; font-size:0.6rem; color:#666; text-transform:uppercase; margin-bottom:15px;">Análisis de Estilo</p>
            <div id="chart-content"></div>
        </div>
    </div>

    <script>
        let session;
        const classes = ['Expresionismo Abstracto', 'Cubismo', 'Expresionismo', 'Impresionismo', 'Simbolismo'];
        const statusMsg = document.getElementById('status-msg');
        const btnAnalyze = document.getElementById('btn-analyze');

        // Función Softmax para obtener porcentajes reales
        function softmax(logits) {
            const maxLogit = Math.max(...logits);
            const scores = logits.map(l => Math.exp(l - maxLogit));
            const total = scores.reduce((a, b) => a + b);
            return scores.map(s => s / total);
        }

        async function init() {
            try {
                // Usamos WASM para máxima estabilidad como se ve en tu consola
                session = await ort.InferenceSession.create('./model.onnx', { executionProviders: ['wasm'] });
                statusMsg.innerText = "✅ MODELO LISTO";
                btnAnalyze.disabled = false;
                btnAnalyze.innerText = "✨ ANALIZAR PINCELADAS";
                console.log("Modelo ONNX cargado correctamente");
            } catch (e) {
                statusMsg.innerText = "❌ ERROR AL CARGAR MODELO";
            }
        }
        init();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        document.getElementById('file-input').onchange = e => {
            const reader = new FileReader();
            reader.onload = event => {
                const img = new Image();
                img.onload = () => {
                    // Ajustamos el canvas para que se vea grande pero la IA reciba su tamaño (128x128)
                    canvas.width = 128;
                    canvas.height = 128;
                    ctx.drawImage(img, 0, 0, 128, 128);
                    canvas.style.display = 'block';
                    document.getElementById('placeholder-text').style.display = 'none';
                    document.getElementById('result-box').style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function runInference() {
            if(!session) return;
            statusMsg.innerText = "DESCODIFICANDO ESTILO...";
            
            const imgData = ctx.getImageData(0, 0, 128, 128);
            const input = new Float32Array(1 * 3 * 128 * 128);
            
            // Normalización según ImageNet (como se entrenan las ResNet)
            for (let i = 0; i < 128 * 128; i++) {
                input[i] = (imgData.data[i * 4] / 255 - 0.485) / 0.229;           // R
                input[i + 16384] = (imgData.data[i * 4 + 1] / 255 - 0.456) / 0.224; // G
                input[i + 32768] = (imgData.data[i * 4 + 2] / 255 - 0.406) / 0.225; // B
            }

            const tensor = new ort.Tensor('float32', input, [1, 3, 128, 128]);
            const output = await session.run({ input: tensor });
            const probabilities = softmax(Array.from(output.output.data));

            displayResults(probabilities);
            statusMsg.innerText = "ANÁLISIS COMPLETADO";
        }

        function displayResults(probs) {
            const resultBox = document.getElementById('result-box');
            const chartContent = document.getElementById('chart-content');
            resultBox.style.display = 'block';
            chartContent.innerHTML = "";

            // Ordenamos para ver el ganador primero
            const results = probs.map((p, i) => ({ name: classes[i], prob: p }))
                                 .sort((a, b) => b.prob - a.prob);

            results.forEach(res => {
                const percentage = (res.prob * 100).toFixed(1);
                const row = `
                    <div class="chart-row">
                        <div class="chart-label">
                            <span>${res.name}</span>
                            <span>${percentage}%</span>
                        </div>
                        <div class="bar-bg">
                            <div class="bar-fill" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
                chartContent.innerHTML += row;
            });
        }
    </script>
</body>
</html>
